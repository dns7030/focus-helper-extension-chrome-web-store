<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 Focus Helper</h1>
      <p class="subtitle">Block distracting feeds</p>
    </div>
    
    <div class="controls">
      <div class="control-item master-toggle">
        <div class="control-info">
          <div class="control-icon">🚫</div>
          <div class="control-text">
            <h3>Block Domains</h3>
            <p>Enable/disable domain blocking</p>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="masterToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="control-item">
        <div class="control-info">
          <div class="control-icon">💼</div>
          <div class="control-text">
            <h3>LinkedIn Feed</h3>
            <p>Block the main feed on LinkedIn</p>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="linkedinToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="control-item">
        <div class="control-info">
          <div class="control-icon">🐦</div>
          <div class="control-text">
            <h3>Twitter/X "For You"</h3>
            <p>Block the "For You" timeline</p>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="twitterToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
    
    <div class="section-divider"></div>
    
    <div class="domain-blocking">
      <div class="section-header">
        <h2>🚫 Block Domains</h2>
        <p>Block entire websites</p>
      </div>
      
      <div class="add-domain">
        <input type="text" id="domainInput" placeholder="example.com" />
        <button id="addDomain">Add</button>
      </div>
      
      <div class="blocked-list" id="blockedList">
        <!-- Blocked domains will be added here dynamically -->
      </div>
    </div>
    
    <div class="footer">
      <p class="status" id="status">Settings saved</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
